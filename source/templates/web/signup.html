{% extends 'web/base.html' %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<h2>Create Account</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Sign Up</button>
</form>
<p class="helper">
    Already have an account? <a href="{% url 'login' %}">Login</a>
</p>
{% endblock %}
