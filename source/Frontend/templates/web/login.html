{% extends 'web/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<h2>Login</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Sign In</button>
</form>
<p class="helper">
    Don't have an account? <a href="{% url 'signup' %}">Create one</a>
</p>
{% endblock %}
