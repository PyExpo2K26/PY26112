# render.yaml — Render Blueprint for WSP
# https://docs.render.com/infrastructure-as-code
services:
  - type: web
    name: water-surveillance-portal
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd code/source && gunicorn water_portal.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: TWILIO_ACCOUNT_SID
        sync: false  # Set this in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false  # Set this in Render dashboard
      - key: TWILIO_PHONE_NUMBER
        sync: false  # Set this in Render dashboard
  - type: pgsql
    name: water-surveillance-db
    version: "15"
    plan: free
